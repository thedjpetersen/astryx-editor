    <rect x="0" y="154" width="1440" height="846" fill="#eef3ef"/>
    <rect x="54" y="178" width="826" height="24" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M220 178v24M386 178v24M552 178v24M718 178v24" stroke="#cbd5e1"/>

    <rect x="54" y="222" width="826" height="684" rx="4" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <g transform="translate(136 292)">
      <text class="h1" x="0" y="0">Project Brief: Astryx Editor</text>
      <text class="body" x="0" y="50">A compact authoring surface for</text>
      <rect x="262" y="30" width="452" height="29" rx="3" fill="#f3e8ff"/>
      <path d="M262 60h452" stroke="#7c3aed" stroke-width="2"/>
      <text class="body" x="270" y="50">drafting product briefs, release notes, technical plans,</text>
      <text class="body" x="0" y="78">and long-form working documents.</text>

      <text class="h2" x="0" y="136">Release Shape</text>
      <text class="body" x="0" y="176">The first public package should feel useful as a complete editor while</text>
      <text class="body" x="0" y="204">still exposing the core document primitives for embedded use.</text>
      <circle cx="8" cy="250" r="3" fill="#111827"/>
      <text class="body" x="24" y="256">Use Astryx themes for product chrome, commands, status, and document furniture.</text>
      <circle cx="8" cy="288" r="3" fill="#111827"/>
      <text class="body" x="24" y="294">Keep the editing engine independent from the surrounding application shell.</text>
      <circle cx="8" cy="326" r="3" fill="#111827"/>
      <text class="body" x="24" y="332">Make document state easy to serialize as HTML, JSON, and plain text.</text>

      <rect x="0" y="374" width="650" height="66" fill="#f8fafc" stroke="#cbd5e1"/>
      <rect x="0" y="374" width="4" height="66" fill="#2f7d5b"/>
      <text class="body" x="18" y="400">The package should start small, but every layer should be replaceable</text>
      <text class="body" x="18" y="428">by a host application.</text>

      <text class="h2" x="0" y="500">Draft Notes</text>
      <text class="body" x="0" y="540">In order to validate review affordances, this draft includes</text>
      <rect x="464" y="520" width="34" height="26" rx="3" fill="#fee2e2"/>
      <text class="body" x="470" y="540">teh</text>
      <text class="body" x="506" y="540">kind of rough wording</text>
      <text class="body" x="0" y="568">that is really useful during editing.</text>
    </g>

    <g transform="translate(54 922)">
      <text x="826" y="0" text-anchor="end" class="muted small">112 words   642 letters   1 min read</text>
    </g>

    <g transform="translate(54 940)">
      <rect x="0" y="0" width="300" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="12" y="18" class="label">Autocomplete</text>
      <rect x="116" y="12" width="82" height="24" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="157" y="28" text-anchor="middle" fill="#111827" class="small" font-weight="800">writing</text>
      <rect x="204" y="12" width="84" height="24" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="246" y="28" text-anchor="middle" fill="#111827" class="small" font-weight="800">workflow</text>

      <rect x="314" y="0" width="566" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
