      <text x="420" y="22" fill="#0e7490" class="small" font-weight="850">Continue paragraph</text>
      <text x="420" y="34" fill="#0f766e" font-size="10">Offline AI-style draft</text>
      <rect x="598" y="8" width="224" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="610" y="22" fill="#111827" class="small" font-weight="850">Expand review workflow</text>
      <text x="610" y="34" fill="#64748b" font-size="10">Review-focused continuation</text>
    </g>

    <rect x="912" y="154" width="528" height="846" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="912" y="154" width="528" height="38" fill="#f1f5f9" stroke="#cbd5e1"/>
