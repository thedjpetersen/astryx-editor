      <text x="56" y="16" text-anchor="middle" fill="#b45309" class="small" font-weight="800">4 suggestions</text>
      <rect class="chip" x="120" y="0" width="118" height="24" rx="6"/>
      <text x="179" y="16" text-anchor="middle" fill="#7c3aed" class="small" font-weight="800">1 open comment</text>

      <g transform="translate(0 46)">
        <rect x="0" y="0" width="456" height="112" rx="6" fill="#fff7ed" stroke="#fdba74"/>
        <rect x="0" y="0" width="4" height="112" fill="#ea580c"/>
        <text x="14" y="20" fill="#9a3412" class="tiny">Wordy</text>
        <text x="14" y="46" fill="#111827" font-size="15" font-weight="850">Wordy phrase: "In order to"</text>
        <text x="14" y="70" class="muted small">Try "to".</text>
        <rect x="14" y="82" width="58" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="43" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Apply</text>
        <rect x="80" y="82" width="78" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="119" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Comment</text>
      </g>
      <g transform="translate(0 172)">
        <rect x="0" y="0" width="456" height="112" rx="6" fill="#fef2f2" stroke="#fecaca"/>
        <rect x="0" y="0" width="4" height="112" fill="#dc2626"/>
        <text x="14" y="20" fill="#991b1b" class="tiny">Typo</text>
        <text x="14" y="46" fill="#111827" font-size="15" font-weight="850">Possible typo: "teh"</text>
        <text x="14" y="70" class="muted small">Replace with "the".</text>
        <rect x="14" y="82" width="58" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="43" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Apply</text>
        <rect x="80" y="82" width="78" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="119" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Comment</text>
      </g>
      <g transform="translate(0 298)">
        <rect x="0" y="0" width="456" height="112" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
        <rect x="0" y="0" width="4" height="112" fill="#2563eb"/>
        <text x="14" y="20" fill="#1d4ed8" class="tiny">Hedge</text>
        <text x="14" y="46" fill="#111827" font-size="15" font-weight="850">Hedge word: "really"</text>
        <text x="14" y="70" class="muted small">Remove it when the sentence is stronger without it.</text>
        <rect x="14" y="82" width="58" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="43" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Apply</text>
        <rect x="80" y="82" width="78" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="119" y="98" text-anchor="middle" fill="#111827" class="small" font-weight="800">Comment</text>
      </g>
